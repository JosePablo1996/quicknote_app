name: quicknote_app
description: A new Flutter project.
publish_to: 'none'

version: 2.1.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # 🎯 DEPENDENCIAS ESENCIALES
  http: ^1.2.1
  provider: ^6.1.1
