name: quicknote_app
description: A new Flutter project.
publish_to: 'none'

version: 2.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # 🎯 DEPENDENCIAS ESENCIALES
  http: ^1.2.1
  provider: ^6.1.1
  intl: ^0.19.0

  # 🔐 DEPENDENCIAS DE SEGURIDAD Y BIOMETRÍA
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  pin_code_fields: ^8.0.1
  pattern_lock: ^2.0.0

  # 🔄 DEPENDENCIA PARA REINTENTOS AUTOMÁTICOS
  retry: ^3.1.0  # Para reintentar peticiones HTTP fallidas

  # 🗄️ SUPABASE PARA ALMACENAMIENTO DE IMÁGENES Y DATOS
  supabase_flutter: ^2.0.0  # Cliente oficial de Supabase para Flutter
  image_picker: ^1.0.4  # Para seleccionar imágenes de la galería/cámara
  url_launcher: ^6.2.1  # Para abrir enlaces externos (GitHub)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true