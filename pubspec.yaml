name: quicknote_app
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # 🎯 DEPENDENCIAS ESENCIALES (para la app actual)
  # ----------------------------------------------
  # Para peticiones HTTP a tu API
  http: ^1.2.1
  
  # Para manejo de estado (recomendado)
  provider: ^6.1.2
  
  # Para formateo de fechas
  intl: ^0.19.0

  # 📦 DEPENDENCIAS PARA FUNCIONALIDADES FUTURAS (opcionales - descomenta cuando las necesites)
  # ----------------------------------------------
  
  # Para NOTAS DE VOZ - Grabación y reproducción
  # record: ^5.0.0                    # Grabar audio
  # audioplayers: ^6.0.0              # Reproducir audio
  # path_provider: ^2.1.3              # Acceder a directorios del dispositivo
  # permission_handler: ^11.3.1        # Solicitar permisos en tiempo de ejecución
  
  # Para CÁMARA y FOTOS
  # camera: ^0.11.0                   # Acceso a cámara
  # image_picker: ^1.1.2               # Seleccionar imágenes de galería/cámara
  
  # Para ALMACENAMIENTO LOCAL (guardar datos sin conexión)
  # shared_preferences: ^2.2.3         # Guardar preferencias simples
  # sqflite: ^2.3.3                    # Base de datos local SQLite

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # 🎨 RECURSOS (imágenes, iconos, etc.)
  # ------------------------------------
  # assets:
  #   - assets/images/
  #   - assets/icons/

  # 🖋️ FUENTES PERSONALIZADAS (opcional)
  # ------------------------------------
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf